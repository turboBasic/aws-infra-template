name: "On PR: Conventional Commits"
# cspell:ignore amannn commitlint wagoid

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR title
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce Conventional Commit format in PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test

  commit-messages:
    name: Validate commit messages
    # Skip draft PRs and metadata-only edits (title/body changes do not alter commits).
    if: ${{ !github.event.pull_request.draft && github.event.action != 'edited' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce Conventional Commit format in commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          failOnWarnings: true
